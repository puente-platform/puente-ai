name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: puente-ai-dev
  REGION: us-central1
  SERVICE_NAME: puente-backend
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip — no backend changes
        if: |
          !startsWith(github.event_name, 'push') &&
          !contains(join(toJSON(github.event.pull_request.changed_files), ''), 'backend/')
        run: |
          echo "No backend changes detected. Skipping build."

      # Only authenticate on push to main — not on pull_request
      - name: Authenticate to Google Cloud
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2.1.7
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v2.1.4

      - name: Assert required Cloud Run env vars are present (KAN-39)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          REQUIRED_VARS=(DOCUMENT_AI_PROCESSOR_ID GEMINI_API_KEY GEMINI_MODEL GCS_BUCKET_NAME)
          SERVICE="${{ env.SERVICE_NAME }}"
          REGION="${{ env.REGION }}"
          PROJECT="${{ env.PROJECT_ID }}"

          # Bootstrap: skip if service doesn't exist yet (first deploy).
          # `describe` exits 1 with "Cannot find service" on stderr for a
          # missing service. We check exit code (not stdout) per empirical
          # verification on 2026-05-04.
          if ! gcloud run services describe "$SERVICE" \
                 --region "$REGION" --project "$PROJECT" \
                 --format=json >/tmp/svc.json 2>/dev/null; then
            echo "::warning::Cloud Run service '$SERVICE' not found — first deploy, skipping KAN-39 env assertion"
            exit 0
          fi

          # Extract env entries from the current revision and check each
          # required var is present AND has a non-empty value.
          #
          # The jq query uses `//` (alternative operator) to handle both:
          #   - plain env vars:  .value
          #   - KAN-45 Secret Manager refs (future):  .valueFrom.secretKeyRef.name
          #
          # Using --format=json + jq instead of gcloud's built-in filter
          # syntax because the nested-array filter expression
          # (.env.filter("name:X").extract(value)) produced empty output
          # in empirical testing and is unreliable for this use case.
          MISSING=()
          for VAR in "${REQUIRED_VARS[@]}"; do
            PRESENT=$(jq -r --arg name "$VAR" \
              '.spec.template.spec.containers[0].env[]?
               | select(.name == $name)
               | (.value // (.valueFrom.secretKeyRef.name // ""))' /tmp/svc.json)
            if [[ -z "$PRESENT" ]]; then
              MISSING+=("$VAR")
            fi
          done

          if (( ${#MISSING[@]} > 0 )); then
            echo "::error::Required env vars missing on current Cloud Run revision: ${MISSING[*]}"
            echo "::error::Restore them via the Cloud Run UI or:"
            echo "::error::  gcloud run services update $SERVICE --region $REGION --update-env-vars KEY=VAL"
            echo "::error::Then re-run this workflow. See docs/CLAUDE.md § Environment Variables for the runbook."
            echo "::error::This is the KAN-39 pre-deploy guard preventing the 2026-04-21 /analyze regression."
            exit 1
          fi

          echo "✓ All ${#REQUIRED_VARS[@]} required env vars present on current revision."
          rm -f /tmp/svc.json

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/puente-backend/${{ env.SERVICE_NAME }}:${{ github.sha }} ./backend
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/puente-backend/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        if: github.event_name == 'push'
        # `--update-env-vars` uses merge semantics: it only updates the
        # listed keys and leaves all other env vars (GEMINI_API_KEY,
        # GEMINI_MODEL, DOCUMENT_AI_PROCESSOR_ID, VERTEX_AI_LOCATION,
        # GEMINI_LOCATION, ...) intact on the revision. The previous
        # `--set-env-vars` flag would have wiped every unlisted variable
        # on each deploy, which is how the 2026-04-22 incident response
        # for KAN-43 / KAN-44 surfaced: any merge to main would silently
        # revert the service to a broken state (no Gemini key, default
        # model falling back to a deprecated id). If you need to add or
        # remove a managed env var, do it via the Cloud Run UI / a
        # `gcloud run services update` one-off, not by widening the
        # list here.
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/puente-backend/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --update-env-vars GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET_NAME=puente-documents-dev,ENVIRONMENT=production \
            --memory 512Mi \
            --timeout 300

      - name: Show deployment URL
        if: github.event_name == 'push'
        run: |
          echo "Deployed to:"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'