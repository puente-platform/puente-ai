name: Firestore Rules Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - 'firebase-emulator/**'
      - '.github/workflows/firestore-rules-test.yml'
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - 'firebase-emulator/**'

jobs:
  rules-test:
    name: Run Firestore rules unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: firebase-emulator/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install test dependencies
        working-directory: firebase-emulator
        run: npm ci

      - name: Start Firestore emulator and run rules tests
        working-directory: firebase-emulator
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-test \
            "npm run test:ci"
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
